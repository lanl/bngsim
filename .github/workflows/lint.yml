name: lint

# CI gate for the C/C++ formatting hook that runs locally via pre-commit but was
# previously ungated in CI. Nothing enforced clang-format on push/PR, so src/*.cpp
# and include/*.hpp silently drifted out of the pinned v17.0.6 format (surfaced
# while fixing the SSA-JIT propensity export, lanl/bngsim #6). This job replays
# the SAME pinned hook from .pre-commit-config.yaml, so CI and a developer's
# `pre-commit run` can never disagree on the clang-format version — a mismatch is
# how the drift went unnoticed in the first place (a newer local clang-format
# reformats differently than the pinned one).
#
# Scoped to the C/C++ tree + the format config. The other pre-commit hooks
# (ruff, mypy, hygiene) are intentionally not gated here yet; add them once the
# tree is clean under each.

on:
  push:
    branches: [main]
    paths: &lint_paths
      - "src/**"
      - "include/**"
      - ".clang-format"
      - ".pre-commit-config.yaml"
      - ".github/workflows/lint.yml"
  pull_request:
    paths: *lint_paths

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: clang-format (C/C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pre-commit>=3.5"

      # Runs the clang-format hook at the version pinned in
      # .pre-commit-config.yaml (mirrors-clang-format rev). --all-files checks the
      # whole tree, not just the push diff, so a merge that reintroduces drift is
      # caught even if it did not touch a C/C++ file directly.
      # --show-diff-on-failure prints exactly what to reformat.
      - name: clang-format (pinned via pre-commit)
        run: pre-commit run clang-format --all-files --show-diff-on-failure
