name: lint

# CI gate that replays the project's pre-commit hooks at their PINNED versions, so
# CI and a developer's local `pre-commit run` can never disagree — a version mismatch
# is exactly how drift went unnoticed (a newer local tool formats differently than the
# pinned one). It exists because "nothing in CI runs the hooks" let src/*.cpp and
# include/*.hpp silently drift out of the pinned clang-format (lanl/bngsim #6). #7
# closes the SAME gap for the rest of the config — ruff, ruff-format, mypy, and the
# hygiene hooks — by running the whole suite here instead of only clang-format.
#
# `pre-commit run --all-files` runs every commit-stage hook (clang-format, ruff,
# ruff-format, mypy, and the pre-commit-hooks hygiene set). It does NOT run the local
# pre-push pytest hook (stages: [pre-push]) or the manual local-CI hooks
# (stages: [manual]), so this stays a fast lint gate. --all-files scans the whole tree,
# not just the push diff, so a merge that reintroduces drift is caught even in a file
# it did not touch — hence no `paths:` filter.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit (pinned hooks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pre-commit>=3.5"

      # Cache the installed hook environments (clang-format binary, ruff, mypy+numpy,
      # pre-commit-hooks). Keyed on the config so a pinned-version bump busts the cache.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # Replays every commit-stage hook at the version pinned in
      # .pre-commit-config.yaml. --show-diff-on-failure prints exactly what to reformat.
      - name: pre-commit run --all-files
        run: pre-commit run --all-files --show-diff-on-failure
