name: windows-nfsim

# Windows NFsim regression guard (issue #1). NFsim runs in-process as vendored
# C++; it was fully broken on Windows (every initialize()/simulate() aborted
# because System::registerOutputFileLocation("/dev/null") cannot open that path
# on Windows) and nothing caught it — the wheel's smoke test only checks import +
# HAS_KLU. This job builds bngsim on windows-latest (KLU off; NFsim does not use
# SuiteSparse, so we skip the slow from-source SuiteSparse step) and runs the
# NFsim test cluster, so a Windows-only NFsim regression fails CI instead of
# shipping silently. The pytest log is always uploaded as an artifact.
#
# Scoped to paths that can affect NFsim-on-Windows so it does not rebuild on
# every push. Also runnable manually (workflow_dispatch) for ad-hoc repros.

on:
  workflow_dispatch:
    inputs:
      pytest_args:
        description: "Extra pytest args (e.g. -x, -k some_pattern, or a single file path)"
        required: false
        default: ""
      python_version:
        description: "Python version to build/test against"
        required: false
        default: "3.12"
  push:
    branches: [main]
    paths: &nfsim_paths
      - "src/nfsim_simulator.cpp"
      - "src/cvode_simulator.cpp"
      - "include/bngsim/platform_compat.hpp"
      - "third_party/nfsim/**"
      - "python/bngsim/_nfsim_session.py"
      - "python/tests/test_nfsim*.py"
      - ".github/workflows/windows-nfsim.yml"
  pull_request:
    paths: *nfsim_paths

concurrency:
  group: windows-nfsim-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nfsim-tests:
    name: NFsim tests · windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version || '3.12' }}

      - name: Build & install bngsim (NFsim on, KLU off)
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          # Override the pyproject BNGSIM_REQUIRE_KLU=ON define so the build does
          # not need SuiteSparse; ENABLE_KLU=OFF avoids the KLU autobuild too.
          # The NFsim test cluster + conftest only need pytest (numpy is a base
          # bngsim dep); skip the [test] extra (antimony/scipy) to stay lean.
          python -m pip install -v \
            --config-settings=cmake.define.BNGSIM_ENABLE_KLU=OFF \
            --config-settings=cmake.define.BNGSIM_REQUIRE_KLU=OFF \
            --config-settings=cmake.define.BNGSIM_BUILD_TESTS=OFF \
            .
          python -m pip install "pytest>=8.0"

      - name: Show build / capability info
        shell: bash
        run: |
          set -euxo pipefail
          python -c "import platform, sys; print(platform.platform()); print(sys.version)"
          python -c "import bngsim; print('bngsim', bngsim.__version__); print('HAS_NFSIM', bngsim.HAS_NFSIM); print('HAS_KLU', bngsim.HAS_KLU)"

      - name: Run NFsim test cluster
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -p no:cacheprovider \
            python/tests/test_nfsim_session.py \
            python/tests/test_nfsim.py \
            python/tests/test_nfsim_tech_debt.py \
            python/tests/test_nfsim_tstart.py \
            python/tests/test_nfsim_molecularity.py \
            python/tests/test_nfsim_selectors.py \
            -rA --tb=long ${{ inputs.pytest_args }} \
            2>&1 | tee nfsim-windows.log

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nfsim-windows-log-py${{ inputs.python_version || '3.12' }}
          path: nfsim-windows.log
          if-no-files-found: error
